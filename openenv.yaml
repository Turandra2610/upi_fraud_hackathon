name: upi-fraud-investigator
version: "1.0.0"
description: >
  UPI Fraud Pattern Investigator — An RL environment where an agent investigates
  UPI transaction streams to detect fraud patterns unique to Indian digital payments.
  India processes 14 billion UPI transactions/month; this environment simulates
  real fraud detection scenarios across three difficulty levels.

server:
  url: http://localhost:7860

tasks:
  - name: single-transaction-classify
    description: >
      EASY: Given one suspicious UPI transaction with metadata,
      classify it as fraud / legitimate / needs-review.
    difficulty: easy
    max_steps: 5

  - name: account-compromise-detect
    description: >
      MEDIUM: Given 20 transactions from one account over 7 days,
      detect if the account has been compromised (mule account pattern).
    difficulty: medium
    max_steps: 10

  - name: fraud-ring-investigate
    description: >
      HARD: Given 100 transactions across 15 accounts, detect an organized
      fraud ring — map the money flow, identify the originator account,
      and flag the cash-out endpoint.
    difficulty: hard
    max_steps: 20

observation_space:
  type: object
  description: >
    Structured UPI transaction data including sender/receiver VPA,
    amount, timestamp, device fingerprint, location, merchant category,
    and behavioral metadata.

action_space:
  type: object
  description: >
    Agent submits a classification decision with supporting evidence.
    Fields: decision (fraud|legitimate|needs-review), confidence (0.0-1.0),
    flagged_accounts (list), fraud_type (string), reasoning (string).

reward:
  description: >
    Balanced reward penalizing both false positives (blocking real users)
    and false negatives (missing fraud). Perfect detection = 1.0.
    Partial credit for correct direction with wrong confidence.
  range: [0.0, 1.0]
