version: "1.0"
name: "UPI-Fraud-Defense-v1"
type: "reinforcement-learning"
app_port: 7860

tasks:
  - id: "easy"
    description: "Classify a single suspicious transaction as fraud, legitimate, or needs-review"
    reward_threshold: 0.8

  - id: "medium"
    description: "Detect mule account pattern from 20 transactions over 7 days"
    reward_threshold: 0.7

  - id: "hard"
    description: "Detect organized fraud ring across 100 transactions from 15 accounts"
    reward_threshold: 0.6

grader:
  type: "llm-scoring"
  metrics: ["safety", "efficiency", "explainability"]

endpoints:
  reset: "/reset"
  step: "/step"
  health: "/health"
